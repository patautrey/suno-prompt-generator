<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suno Style Prompt Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #ff4757;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #a4b0be;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2f3542;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #ff6b81;
        }
        .output-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #2f3542;
            border-left: 5px solid #ff4757;
            border-radius: 4px;
            min-height: 40px;
            word-wrap: break-word;
            font-family: monospace;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .copy-btn {
            background: #747d8c;
            width: auto;
            padding: 6px 12px;
            font-size: 12px;
            margin-top: 0;
        }
        .copy-btn:hover {
            background: #a4b0be;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Suno Style Prompt Generator</h1>
    
    <div class="input-group">
        <label for="genre">Core Music Genre / Style:</label>
        <select id="genre">
            <option value="">-- Select Core Genre (Optional) --</option>
            <optgroup label="Electronic & Dance">
                <option value="1980s synthwave">1980s Synthwave</option>
                <option value="cyberpunk industrial">Cyberpunk Industrial</option>
                <option value="lo-fi hip hop">Lo-Fi Hip Hop</option>
                <option value="deep house">Deep House</option>
                <option value="eurodance">Eurodance</option>
                <option value="liquid drum and bass">Liquid Drum & Bass</option>
            </optgroup>
            <optgroup label="Rock & Alternative">
                <option value="90s grunge">90s Grunge</option>
                <option value="classic hard rock">Classic Hard Rock</option>
                <option value="indie surf rock">Indie Surf Rock</option>
                <option value="gothic metal">Gothic Metal</option>
                <option value="shoegaze">Shoegaze</option>
                <option value="post-punk revival">Post-Punk Revival</option>
            </optgroup>
            <optgroup label="Pop & Urban">
                <option value="modern r&b">Modern R&B</option>
                <option value="70s motown soul">70s Motown Soul</option>
                <option value="trap hip hop">Trap Hip Hop</option>
                <option value="k-pop bounce">K-Pop Bounce</option>
                <option value="nu-disco pop">Nu-Disco Pop</option>
            </optgroup>
            <optgroup label="Roots, Folk & Acoustic">
                <option value="dark country outlaw">Dark Outlaw Country</option>
                <option value="bluegrass americana">Bluegrass Americana</option>
                <option value="celtic folk ballad">Celtic Folk Ballad</option>
                <option value="roots reggae">Roots Reggae</option>
            </optgroup>
            <optgroup label="Jazz & Global Styles">
                <option value="smoky jazz lounge">Smoky Jazz Lounge</option>
                <option value="bossa nova jazz">Bossa Nova Jazz</option>
                <option value="afrobeats groove">Afrobeats Groove</option>
                <option value="flamenco fusion">Flamenco Fusion</option>
                <option value="city pop">Japanese City Pop</option>
            </optgroup>
            <optgroup label="Cinematic & Orchestral">
                <option value="epic orchestral fantasy">Epic Orchestral Fantasy</option>
                <option value="dark ambient drone">Dark Ambient Drone</option>
                <option value="neo-classical piano">Neo-Classical Piano</option>
                <option value="cybernetic sci-fi score">Sci-Fi Synth Score</option>
            </optgroup>
        </select>
    </div>

    <div class="input-group">
        <label for="mood">Mood & Energy:</label>
        <select id="mood">
            <option value="">-- Select Mood (Optional) --</option>
            <option value="uplifting">Uplifting & Joyful</option>
            <option value="energetic">High-Energy & Driven</option>
            <option value="melancholic">Melancholic & Tearful</option>
            <option value="dark">Dark & Sinister</option>
            <option value="mysterious">Mysterious & Cryptic</option>
            <option value="dreamy">Dreamy & Ethereal</option>
            <option value="aggressive">Aggressive & Fierce</option>
            <option value="chill">Chill & Laid-back</option>
            <option value="epic">Epic & Grand</option>
            <option value="cinematic">Cinematic & Dramatic</option>
            <option value="haunting">Haunting & Spooky</option>
            <option value="nostalgic">Nostalgic & Bittersweet</option>
            <option value="euphoric">Euphoric & Blissful</option>
            <option value="gritty">Gritty & Unpolished</option>
            <option value="sensual">Sensual & Smooth</option>
            <option value="psychedelic">Psychedelic & Trippy</option>
            <option value="triumphant">Triumphant & Heroic</option>
            <option value="somber">Somber & Gloomy</option>
            <option value="playful">Playful & Quirky</option>
            <option value="anxious">Anxious & Tense</option>
            <option value="peaceful">Peaceful & Serene</option>
            <option value="hypnotic">Hypnotic & Trance-like</option>
            <option value="furious">Furious & Explosive</option>
            <option value="lonely">Lonely & Desolate</option>
            <option value="rebellious">Rebellious & Defiant</option>
        </select>
    </div>

    <div class="input-group">
        <label for="production">Production & Mix Environment:</label>
        <select id="production">
            <option value="">-- Select Production Style (Optional) --</option>
            <option value="polished radio master">Polished Radio Master (Clean, Commercial)</option>
            <option value="raw garage rehearsal mix">Raw Garage Rehearsal (Gritty, Real Room)</option>
            <option value="lo-fi cassette warmth">Lo-Fi Cassette Warmth (Vintage Analog Hiss)</option>
            <option value="crispy modern streaming master">Crispy Streaming Master (Max Clarity, Loud)</option>
            <option value="smoky underground club mix">Underground Club Mix (Heavy Low-End Bass)</option>
            <option value="warm analog tape saturation">Analog Tape Saturation (Rich Midrange)</option>
            <option value="intimate studio dry mix">Intimate Dry Mix (Up-Close, Minimal Reverb)</option>
            <option value="washed-out cavernous reverb space">Cavernous Reverb Space (Distant, Massive Echoes)</option>
            <option value="dusty vinyl sample aesthetic">Dusty Vinyl Sample (Old Record Player Feel)</option>
            <option value="high-fidelity futuristic clean mix">Hi-Fi Futuristic Mix (Ultra-Sharp Electronic)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="progression">Dynamic Progression & Arrangement:</label>
        <select id="progression">
            <option value="">-- Select Track Progression (Optional) --</option>
            <option value="gradual dynamic build to massive climax">Gradual Build (Starts small, explodes at end)</option>
            <option value="minimalist sparse arrangement">Minimalist & Sparse (Keeps it empty, clean)</option>
            <option value="explosive energy jumps and drops">Sudden Explosive Jumps (High-impact drops)</option>
            <option value="steady rhythmic driving repetition">Steady Driving Repetition (Hypnotic, Constant)</option>
            <option value="loud-quiet-loud alternative dynamics">Loud-Quiet-Loud (Classic 90s alternative structure)</option>
            <option value="evolving atmospheric layers">Evolving Layers (Sounds shifting smoothly)</option>
            <option value="anthem hook focus">Anthemic Focus (Big, immediate, simple structures)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="tempo">Tempo / BPM:</label>
        <select id="tempo">
            <option value="">-- Select Tempo (Optional) --</option>
            <option value="slow">Slow / Ambient (60-80 BPM)</option>
            <option value="mid-tempo">Mid-Tempo / Groovy (90-110 BPM)</option>
            <option value="fast">Fast / Upbeat (120-140 BPM)</option>
            <option value="very fast">Very Fast / High Energy (150+ BPM)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="vocals">Vocal Style / Type:</label>
        <select id="vocals">
            <option value="">-- Select Vocal Type (Optional) --</option>
            <option value="male vocals">Male Vocals</option>
            <option value="female vocals">Female Vocals</option>
            <option value="soaring vocals">Soaring Vocals</option>
            <option value="gritty vocals">Gritty / Raw Vocals</option>
            <option value="whispering vocals">Whispering / Soft Vocals</option>
            <option value="melodic vocals">Melodic / Clean Vocals</option>
            <option value="instrumental">Instrumental Only (No Vocals)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="instrument1">Instrument & Texture - Option 1:</label>
        <select id="instrument1">
            <option value="">-- Select Option 1 (Optional) --</option>
            <optgroup label="Keys & Organs">
                <option value="Rhodes Electric Piano">Rhodes Electric Piano</option>
                <option value="Wurlitzer">Wurlitzer</option>
                <option value="Clavinet">Clavinet</option>
                <option value="Hammond Organ">Hammond Organ</option>
                <option value="Harpsichord">Harpsichord</option>
                <option value="Pipe Organ">Pipe Organ</option>
            </optgroup>
            <optgroup label="Strings & Folk">
                <option value="Slap Bass">Slap Bass</option>
                <option value="Upright Bass">Upright Bass</option>
                <option value="Distorted Guitar">Distorted Guitar</option>
                <option value="Nylon-String Guitar">Nylon-String Guitar</option>
                <option value="Mandolin">Mandolin</option>
                <option value="Banjo">Banjo</option>
            </optgroup>
            <optgroup label="Synths & Electronic">
                <option value="Analog Synth">Analog Synth</option>
                <option value="Synth Pad">Synth Pad</option>
                <option value="808 Bass">808 Bass</option>
                <option value="Arpeggiated Synth">Arpeggiated Synth</option>
                <option value="Supersaw">Supersaw</option>
                <option value="Chiptune 8-bit">Chiptune 8-bit</option>
            </optgroup>
            <optgroup label="Drums & Percussion">
                <option value="Brush Drums">Brush Drums</option>
                <option value="Taiko Drums">Taiko Drums</option>
                <option value="Cajón">Cajón</option>
                <option value="Congas">Congas</option>
                <option value="Tambourine & Shaker">Tambourine & Shaker</option>
            </optgroup>
            <optgroup label="Horns & Wind">
                <option value="Muted Trumpet">Muted Trumpet</option>
                <option value="Saxophone">Saxophone</option>
                <option value="Flute">Flute</option>
            </optgroup>
            <optgroup label="Textures & FX">
                <option value="Vinyl Crackle">Vinyl Crackle</option>
                <option value="Tape Hiss">Tape Hiss</option>
                <option value="Crowd Murmurs">Crowd Murmurs</option>
                <option value="Reverb Swells">Reverb Swells</option>
            </optgroup>
        </select>
    </div>

    <div class="input-group">
        <label for="instrument2">Instrument & Texture - Option 2:</label>
        <select id="instrument2">
            <option value="">-- Select Option 2 (Optional) --</option>
            <optgroup label="Keys & Organs">
                <option value="Rhodes Electric Piano">Rhodes Electric Piano</option>
                <option value="Wurlitzer">Wurlitzer</option>
                <option value="Clavinet">Clavinet</option>
                <option value="Hammond Organ">Hammond Organ</option>
                <option value="Harpsichord">Harpsichord</option>
                <option value="Pipe Organ">Pipe Organ</option>
            </optgroup>
            <optgroup label="Strings & Folk">
                <option value="Slap Bass">Slap Bass</option>
                <option value="Upright Bass">Upright Bass</option>
                <option value="Distorted Guitar">Distorted Guitar</option>
                <option value="Nylon-String Guitar">Nylon-String Guitar</option>
                <option value="Mandolin">Mandolin</option>
                <option value="Banjo">Banjo</option>
            </optgroup>
            <optgroup label="Synths & Electronic">
                <option value="Analog Synth">Analog Synth</option>
                <option value="Synth Pad">Synth Pad</option>
                <option value="808 Bass">808 Bass</option>
                <option value="Arpeggiated Synth">Arpeggiated Synth</option>
                <option value="Supersaw">Supersaw</option>
                <option value="Chiptune 8-bit">Chiptune 8-bit</option>
            </optgroup>
            <optgroup label="Drums & Percussion">
                <option value="Brush Drums">Brush Drums</option>
                <option value="Taiko Drums">Taiko Drums</option>
                <option value="Cajón">Cajón</option>
                <option value="Congas">Congas</option>
                <option value="Tambourine & Shaker">Tambourine & Shaker</option>
            </optgroup>
            <optgroup label="Horns & Wind">
                <option value="Muted Trumpet">Muted Trumpet</option>
                <option value="Saxophone">Saxophone</option>
                <option value="Flute">Flute</option>
            </optgroup>
            <optgroup label="Textures & FX">
                <option value="Vinyl Crackle">Vinyl Crackle</option>
                <option value="Tape Hiss">Tape Hiss</option>
                <option value="Crowd Murmurs">Crowd Murmurs</option>
                <option value="Reverb Swells">Reverb Swells</option>
            </optgroup>
        </select>
    </div>

    <button onclick="generatePrompt()">Generate Suno Prompt</button>

    <div class="output-box">
        <span id="result">Your prompt will appear here...</span>
        <button class="copy-btn" onclick="copyPrompt()">Copy</button>
    </div>
</div>

<script>
function generatePrompt() {
    const genre = document.getElementById('genre').value;
    const mood = document.getElementById('mood').value;
    const production = document.getElementById('production').value;
    const progression = document.getElementById('progression').value;
    const tempo = document.getElementById('tempo').value;
    const vocals = document.getElementById('vocals').value;
    const inst1 = document.getElementById('instrument1').value;
    const inst2 = document.getElementById('instrument2').value;

    let tags = [];

    // Order matters for best Suno tag readability
    if (genre) tags.push(genre);
    if (mood) tags.push(mood);
    if (production) tags.push(production);
    if (progression) tags.push(progression);
    if (tempo) tags.push(tempo);
    if (inst1) tags.push(inst1);
    if (inst2) tags.push(inst2);
    if (vocals) tags.push(vocals);

    if (tags.length === 0) {
        document.getElementById('result').innerText = "Please select at least one feature!";
        return;
    }

    document.getElementById('result').innerText = tags.join(', ').toLowerCase();
}

function copyPrompt() {
    const text = document.getElementById('result').innerText;
    if (text && text !== "Your prompt will appear here..." && text !== "Please select at least one feature!") {
        navigator.clipboard.writeText(text);
        alert("Prompt copied to clipboard!");
    }
}
</script>

</body>
</html>
