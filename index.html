function loadBillboardPreset() {
    const year = document.getElementById('billboardPreset').value;
    if (!year) return;
    
    const config = billboardData[year];
    
    // Set form fields based on preset config
    document.getElementById('genre').value = config.genre;
    document.getElementById('mood').value = config.mood;
    document.getElementById('production').value = config.production || config.prod;
    document.getElementById('progression').value = config.progression || config.prog;
    document.getElementById('tempo').value = config.tempo;
    document.getElementById('vocals').value = config.vocals;
    
    // Try to map instruments cleanly or reset
    document.getElementById('instrument1').value = findDropdownOption('instrument1', config.inst1);
    document.getElementById('instrument2').value = findDropdownOption('instrument2', config.inst2);

    generatePrompt();
}

function findDropdownOption(id, val) {
    const el = document.getElementById(id);
    for (let option of el.options) {
        if (option.value.toLowerCase() === val.toLowerCase()) {
            return option.value;
        }
    }
    return ""; // Fallback to none if specific layered item isn't in menu
}

function generatePrompt() {
    const genre = document.getElementById('genre').value;
    const mood = document.getElementById('mood').value;
    const production = document.getElementById('production').value;
    const progression = document.getElementById('progression').value;
    const tempo = document.getElementById('tempo').value;
    const vocals = document.getElementById('vocals').value;
    const inst1 = document.getElementById('instrument1').value;
    const inst2 = document.getElementById('instrument2').value;

    let tags = [];

    if (genre) tags.push(genre);
    if (mood) tags.push(mood);
    if (production) tags.push(production);
    if (progression) tags.push(progression);
    if (tempo) tags.push(tempo);
    if (inst1) tags.push(inst1);
    if (inst2) tags.push(inst2);
    if (vocals) tags.push(vocals);

    if (tags.length === 0) {
        document.getElementById('result').innerText = "Please select a preset or configure a feature!";
        return;
    }

    document.getElementById('result').innerText = tags.join(', ').toLowerCase();
}

function copyPrompt() {
    const text = document.getElementById('result').innerText;
    if (text && text !== "Your prompt will appear here..." && text !== "Please select a preset or configure a feature!") {
        navigator.clipboard.writeText(text);
        alert("Prompt copied to clipboard!");
    }
}
